<!DOCTYPE html>
<html>
<head>
    <title>setTimeout Example</title>
</head>
<body>

<p>Click the button to wait 3 seconds, then Msg is displayed.</p>
<p id="demo"></p>

<button onclick="myFunction()">Try it</button>

<script>
var myVar;

function myFunction() {
    myVar = setTimeout(MsgFunc, 3000);
}

function MsgFunc() {
    document.getElementById("demo").innerHTML = "This text is displayed after three seconds";
}
</script>

</body>
</html>
